name: OSS CNAME Certificate Update
description: Update OSS bucket CNAME certificate using Alibaba Cloud OSS Python SDK
branding:
  icon: shield
  color: orange

inputs:
  access_key_id:
    description: Alibaba Cloud Access Key ID
    required: true
  access_key_secret:
    description: Alibaba Cloud Access Key Secret
    required: true
  bucket:
    description: OSS bucket name
    required: true
  region:
    description: OSS region or endpoint fragment
    required: true
  domain:
    description: Bound custom domain for CNAME
    required: true
  certificate_path:
    description: Fullchain certificate file path
    required: true
  private_key_path:
    description: Private key file path
    required: true

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install oss2

    - name: Update OSS CNAME certificate
      shell: bash
      run: |
        python "${{ github.action_path }}/main.py" \
          --access-key-id "${{ inputs.access_key_id }}" \
          --access-key-secret "${{ inputs.access_key_secret }}" \
          --bucket "${{ inputs.bucket }}" \
          --region "${{ inputs.region }}" \
          --domain "${{ inputs.domain }}" \
          --certificate-path "${{ inputs.certificate_path }}" \
          --private-key-path "${{ inputs.private_key_path }}"
